services:
  redis:
    image: redis:7.2-alpine
    container_name: gateway_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: llm_gateway_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://gateway_redis:6379
      - PRIMARY_ENGINE_FAIL_SIMULATION=True
    depends_on:
      redis:
        condition: service_healthy
